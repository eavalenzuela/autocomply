# autocomply — CCF control stubs
# ----------------------------------------------------------------------------
# Near-1:1 mirror of the HITRUST CSF control-reference library (see DESIGN.md).
# These are OUR framework-agnostic CCF controls, laid into the public HITRUST
# skeleton, ready to map 1:1 to HITRUST control references on MyCSF ingest.
#
# Structure: 14 control categories -> 49 control objectives -> 156 control refs.
#
# Provenance / accuracy:
#   - Categories 01-12 follow the ISO/IEC 27002:2005 lineage HITRUST was built
#     on; codes, objectives, and titles here are solid. `iso_2005` gives the
#     source clause (also seeds the future ISO 27001 / SOC 2 crosswalk).
#   - Categories 00, 03, 13 are HITRUST-specific; reconstruction is BEST-EFFORT
#     and must be reconciled on MyCSF ingest (esp. category 13 privacy letters).
#   - Titles are our plain-language placeholders, NOT HITRUST IP.
#
# Fields populated later (defaults below apply to every control until then):
meta:
  generated: 2026-05-22
  csf_structure: { categories: 14, objectives: 49, control_refs: 156 }
  defaults:
    assessment_domain: tbd     # 1 of 19 scoring domains; from MyCSF ingest
    weight: 1.0                # tuned during scoring-math design
    owner: null
    hitrust_ref: null          # the Mapping target; from MyCSF ingest
  pending_mycsf_ingest:
    - assessment_domain (156 -> 19 regrouping)
    - hitrust_ref + authoritative control-reference titles
    - requirement_statements (L1/L2/L3) + e1/i1/r2 membership

