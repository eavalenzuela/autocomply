# ISO/IEC 27001:2022
# ----------------------------------------------------------------------------
# TWO mappable surfaces:
#   (a) clauses 4-10  — the management-system (ISMS) requirements (mandatory)
#   (b) annex_a       — 93 controls in 4 themes (governed by the SoA)
# `kind` distinguishes them on the Requirement entity.
#
# Titles are control/clause identifiers + our paraphrase. ISO standard text is
# copyrighted — identifiers and short titles are referenceable; normative text
# is NOT reproduced here.
#
# new_2022: true marks the 11 Annex A controls with no ISO 27002:2013/2005
# ancestor → they require fresh hand-mapping (the lineage chain can't derive them).
meta:
  framework: ISO/IEC 27001
  version: "2022"
  annexa_themes: { organizational: 37, people: 8, physical: 14, technological: 34 }
  annexa_total: 93

